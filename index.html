<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>PBIG Partner Lead Scanner</title>
  <style>
    :root{--bg1:#061322;--bg2:#0a1d31;--card:rgba(255,255,255,.06);--line:rgba(255,255,255,.12);--text:#fff;--muted:#b7c3d1;--accent:#46d7f4;--accent2:#9be9f8;--ok:#b8ffd8}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:radial-gradient(circle at top right, rgba(70,215,244,.18), transparent 28%),linear-gradient(180deg,var(--bg1),var(--bg2));min-height:100vh}
    .wrap{max-width:1080px;margin:0 auto;padding:16px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;backdrop-filter:blur(10px);margin-bottom:16px}
    h1,h2,p{margin:0}h1{font-size:30px;line-height:1.1;margin-bottom:8px}h2{font-size:20px;margin-bottom:8px}.muted{color:var(--muted)}
    .row,.between,.tabs{display:flex;gap:10px;flex-wrap:wrap}.between{justify-content:space-between;align-items:center}
    .btn{appearance:none;border:none;border-radius:16px;padding:12px 16px;font-weight:700;cursor:pointer;background:var(--accent);color:#042030}
    .btn.secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid var(--line)} .btn:disabled{opacity:.5}
    input,textarea,select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:#fff}
    textarea{min-height:110px} label{display:block;font-size:14px;margin-bottom:6px;color:var(--muted)}
    .video{width:100%;aspect-ratio:4/3;background:#02111d;border-radius:18px;border:1px solid var(--line);object-fit:cover}
    .msg{margin-top:10px;padding:12px 14px;border-radius:14px;background:rgba(70,215,244,.12);border:1px solid rgba(70,215,244,.25)} .msg.error{background:rgba(255,120,120,.12);border-color:rgba(255,120,120,.25);color:#ffd3d3}.msg.ok{background:rgba(120,255,180,.12);border-color:rgba(120,255,180,.25);color:var(--ok)}
    .list,.grid,.stats{display:grid;gap:12px}.lead,.partner,.stat{border:1px solid var(--line);background:rgba(0,0,0,.18);border-radius:16px;padding:12px}.meta,.small{font-size:13px;color:var(--muted);margin-top:6px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);font-size:12px}.hidden{display:none!important}
    .tab{padding:10px 14px;border-radius:14px;border:1px solid var(--line);cursor:pointer;background:rgba(255,255,255,.05);color:#fff}.tab.active{background:rgba(70,215,244,.18);border-color:rgba(70,215,244,.35)}
    .value{font-size:24px;font-weight:800;margin-top:6px}
    @media (min-width:760px){.grid.two{grid-template-columns:1fr 1fr}.stats.three{grid-template-columns:1fr 1fr 1fr}}
    a{color:var(--accent2)} code{background:rgba(255,255,255,.08);padding:2px 6px;border-radius:8px}
  </style>
</head>
<body><div class="wrap"><div id="app"></div></div>
<script>
const STORAGE_KEY='pbig-deployable-v2';
const DEMO_STATE={accounts:[{id:'partner-plainwater',email:'partner@plainwater.nl',password:'demo123',role:'partner',partnerName:'Plainwater'},{id:'partner-insumma',email:'partner@insumma.nl',password:'demo123',role:'partner',partnerName:'InSumma & Webdashboard'},{id:'admin-pbig',email:'admin@pbig.nl',password:'admin123',role:'admin',partnerName:'PBIG'}],leads:{'partner-plainwater':[{id:'lead-1',fullName:'Sanne de Wit',email:'sanne@contoso.nl',company:'Contoso',phone:'+31 6 12345678',status:'Nieuw',notes:'Interesse in Fabric governance.',scannedAt:'2026-03-07T10:12:00',source:'QR vCard'}],'partner-insumma':[]}};
const STATUSES=['Nieuw','Opvolgen','Contact gehad','Gekwalificeerd','Niet relevant'];
let state=loadState(),session=null,stream=null,detector=null,timer=null;
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):JSON.parse(JSON.stringify(DEMO_STATE));}catch{return JSON.parse(JSON.stringify(DEMO_STATE));}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function resetDemo(){state=JSON.parse(JSON.stringify(DEMO_STATE));saveState();render();}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(v){if(!v) return '-'; try{return new Date(v).toLocaleString('nl-NL');}catch{return v;}}
function parseVCard(text){const lines=text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);const pick=(prefixes)=>{const arr=Array.isArray(prefixes)?prefixes:[prefixes];const line=lines.find(l=>arr.some(p=>l.toUpperCase().startsWith(p.toUpperCase())));if(!line)return '';const i=line.indexOf(':');return i>=0?line.slice(i+1).trim():'';};return{fullName:(pick(['FN:','N:'])||'Onbekende bezoeker').replace(/;/g,' ').replace(/\s+/g,' ').trim(),email:pick(['EMAIL:','EMAIL;TYPE=INTERNET:','EMAIL;TYPE=WORK:']),company:pick('ORG:'),phone:pick(['TEL:','TEL;TYPE=CELL:','TEL;TYPE=WORK:'])};}
function currentAccount(){if(!session)return null;return state.accounts.find(a=>a.id===session.accountId)||null;}
function currentLeads(){const acc=currentAccount();if(!acc||acc.role!=='partner')return[];return state.leads[acc.id]||[];}
function flash(text,isError=false,isOk=false){const el=document.getElementById('flash');if(!el)return;el.className=isError?'msg error':(isOk?'msg ok':'msg');el.textContent=text;el.classList.remove('hidden');}
function clearFlash(){const el=document.getElementById('flash');if(el)el.classList.add('hidden');}
function addLeadFromText(text,source){const acc=currentAccount();if(!acc||acc.role!=='partner')return flash('Niet toegestaan.',true);if(!String(text).toUpperCase().includes('BEGIN:VCARD'))return flash('Dit lijkt geen vCard te zijn.',true);const parsed=parseVCard(text);const lead={id:'lead-'+Date.now(),fullName:parsed.fullName||'Onbekende bezoeker',email:parsed.email||'',company:parsed.company||'',phone:parsed.phone||'',status:'Nieuw',notes:'',scannedAt:new Date().toISOString(),source:source||'QR vCard'};if(!state.leads[acc.id])state.leads[acc.id]=[];state.leads[acc.id].unshift(lead);saveState();render();flash('Lead opgeslagen voor '+lead.fullName,false,true);}
function updateLead(id,patch){const acc=currentAccount();if(!acc||acc.role!=='partner')return;state.leads[acc.id]=(state.leads[acc.id]||[]).map(l=>l.id===id?({...l,...patch}):l);saveState();}
function download(name,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}
function exportCsv(){const acc=currentAccount();if(!acc)return;const rows=currentLeads(),headers=['fullName','email','company','phone','status','notes','scannedAt','source'];const e=v=>'"'+String(v??'').replace(/"/g,'""')+'"';const csv=[headers.join(','),...rows.map(r=>headers.map(h=>e(r[h])).join(','))].join('\n');download((acc.partnerName||'partner').toLowerCase().replace(/\s+/g,'-')+'-leads.csv',csv,'text/csv;charset=utf-8');}
function exportJson(){const acc=currentAccount();if(!acc)return;download((acc.partnerName||'partner').toLowerCase().replace(/\s+/g,'-')+'-leads.json',JSON.stringify(currentLeads(),null,2),'application/json');}
function exportExcelLike(){const acc=currentAccount();if(!acc)return;const rows=currentLeads(),headers=['fullName','email','company','phone','status','notes','scannedAt','source'];const e=v=>'"'+String(v??'').replace(/"/g,'""')+'"';const csv=[headers.join(','),...rows.map(r=>headers.map(h=>e(r[h])).join(','))].join('\n');download((acc.partnerName||'partner').toLowerCase().replace(/\s+/g,'-')+'-leads.xls',csv,'application/vnd.ms-excel');}
async function startCamera(){clearFlash();const diag=document.getElementById('diag');if(diag){diag.innerHTML=[['Secure context',window.isSecureContext?'ja':'nee'],['Protocol',location.protocol||'(onbekend)'],['getUserMedia',!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)],['BarcodeDetector','BarcodeDetector' in window]].map(([k,v])=>'<div>'+k+': <strong>'+v+'</strong></div>').join('');}if(!window.isSecureContext)return flash('Camera werkt alleen via HTTPS of localhost.',true);if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia))return flash('Deze browser ondersteunt geen cameratoegang.',true);try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});const video=document.getElementById('video');video.srcObject=stream;await video.play();if('BarcodeDetector' in window){detector=new BarcodeDetector({formats:['qr_code']});timer=setInterval(async()=>{try{const codes=await detector.detect(video);if(codes&&codes.length){const value=codes[0].rawValue||'';if(value.toUpperCase().includes('BEGIN:VCARD')){addLeadFromText(value,'Camera QR-scan');stopCamera();}else{flash('QR gevonden, maar inhoud is geen vCard.',true);}}}catch(e){}},800);flash('Camera gestart. Richt op de QR-code op de badge.');}else{flash('Camera gestart, maar BarcodeDetector ontbreekt in deze browser. Gebruik demo-vCard of voeg in productie een QR-library toe.',true);}}catch(err){flash('Camera kon niet starten: '+(err&&err.message?err.message:'onbekende fout'),true);}}
function stopCamera(){if(timer){clearInterval(timer);timer=null;}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}const video=document.getElementById('video');if(video)video.srcObject=null;}
function logout(){stopCamera();session=null;render();}
function login(email,password){const account=state.accounts.find(a=>a.email.toLowerCase()===String(email).trim().toLowerCase()&&a.password===password);if(!account)return flash('Onjuiste inloggegevens.',true);session={accountId:account.id,loggedInAt:new Date().toISOString()};render();}
function createPartner(){const partnerName=(document.getElementById('newPartnerName').value||'').trim();const email=(document.getElementById('newPartnerEmail').value||'').trim().toLowerCase();const password=document.getElementById('newPartnerPassword').value||'';if(!partnerName||!email||!password)return flash('Vul partnernaam, e-mail en wachtwoord in.',true);if(state.accounts.some(a=>a.email.toLowerCase()===email))return flash('Er bestaat al een account met dit e-mailadres.',true);let idBase='partner-'+partnerName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');if(!idBase||idBase==='partner-')idBase='partner-'+Date.now();let uniqueId=idBase;if(state.accounts.some(a=>a.id===uniqueId))uniqueId+='-'+Date.now();state.accounts.push({id:uniqueId,email,password,role:'partner',partnerName});state.leads[uniqueId]=[];saveState();render();flash('Partneraccount aangemaakt voor '+partnerName+'.',false,true);}
function adminStats(){return state.accounts.filter(a=>a.role==='partner').map(a=>({partnerName:a.partnerName,email:a.email,count:(state.leads[a.id]||[]).length}));}
function switchTab(tab,btn){document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-scanner').classList.toggle('hidden',tab!=='scanner');document.getElementById('tab-leads').classList.toggle('hidden',tab!=='leads');document.getElementById('tab-account').classList.toggle('hidden',tab!=='account');}
function changeLeadStatus(id,value){updateLead(id,{status:value});}
function changeLeadField(id,field,value){const patch={};patch[field]=value;updateLead(id,patch);}
function loginView(){return '<div class="card"><div class="pill">PBIG 2027 partner tool</div><h1>Scan badges, bewaar leads veilig en exporteer direct.</h1><p class="muted">Mobiele webapp in PBIG-stijl voor partners. Elke partner ziet alleen de eigen scans. Beheer ziet alleen aantallen per partner.</p></div><div class="grid two"><div class="card"><h2>Inloggen</h2><div id="flash" class="msg hidden"></div><div style="margin-top:12px"><label>E-mailadres</label><input id="loginEmail" value="partner@plainwater.nl" /></div><div style="margin-top:12px"><label>Wachtwoord</label><input id="loginPassword" type="password" value="demo123" /></div><div class="row" style="margin-top:12px"><button class="btn" onclick="login(document.getElementById(\'loginEmail\').value, document.getElementById(\'loginPassword\').value)">Inloggen</button></div></div><div class="card"><h2>Demo-accounts</h2><div class="small"><p><strong>Partner</strong>: partner@plainwater.nl / demo123</p><p><strong>Admin</strong>: admin@pbig.nl / admin123</p><p style="margin-top:10px">Gebruik admin om nieuwe partneraccounts toe te voegen in deze deployable demo.</p></div></div></div>';}
function adminView(){const stats=adminStats(),total=stats.reduce((s,r)=>s+r.count,0);return '<div class="card"><div class="between"><div><div class="pill">Beheer</div><h1>PBIG partner-overzicht</h1><p class="muted">Alleen aantallen zichtbaar. Leads blijven afgeschermd per partner.</p></div><div class="row"><button class="btn secondary" onclick="resetDemo()">Demo resetten</button><button class="btn secondary" onclick="logout()">Uitloggen</button></div></div></div><div class="stats three"><div class="stat"><div class="muted">Partners</div><div class="value">'+stats.length+'</div></div><div class="stat"><div class="muted">Totaal scans</div><div class="value">'+total+'</div></div><div class="stat"><div class="muted">Leadgegevens</div><div class="value" style="font-size:16px">Verborgen voor admin</div></div></div><div class="card"><div id="flash" class="msg hidden"></div><div class="grid two"><div><h2>Partner toevoegen</h2><p class="muted" style="margin-bottom:12px">Maak hier demo-accounts aan die direct kunnen inloggen.</p><div style="margin-top:12px"><label>Partnernaam</label><input id="newPartnerName" placeholder="Bijv. DataMinds" /></div><div style="margin-top:12px"><label>E-mail</label><input id="newPartnerEmail" placeholder="partner@dataminds.nl" /></div><div style="margin-top:12px"><label>Wachtwoord</label><input id="newPartnerPassword" type="password" placeholder="Kies een wachtwoord" /></div><div class="row" style="margin-top:12px"><button class="btn" onclick="createPartner()">Partner aanmaken</button></div><div class="small" style="margin-top:10px">Nieuwe accounts worden in deze demo lokaal op dit apparaat opgeslagen.</div></div><div><h2>Scans per partner</h2><p class="muted" style="margin-bottom:12px">Geschikt voor event-monitoring zonder privacy te schenden.</p><div class="list">'+stats.map(row=>'<div class="partner"><div class="between"><div><strong>'+esc(row.partnerName)+'</strong><div class="meta">'+esc(row.email)+'</div></div><span class="pill">'+row.count+' scans</span></div></div>').join('')+'</div></div></div></div>';}
function partnerView(){const acc=currentAccount(),leads=currentLeads();return '<div class="card"><div class="between"><div><div class="pill">Partneromgeving</div><h1>'+esc(acc.partnerName)+'</h1><p class="muted">Gelijktijdig te gebruiken op meerdere telefoons of tablets met hetzelfde account. In deze demo wordt data lokaal opgeslagen.</p></div><div class="row"><button class="btn secondary" onclick="exportCsv()">CSV</button><button class="btn secondary" onclick="exportExcelLike()">Excel</button><button class="btn secondary" onclick="exportJson()">JSON</button><button class="btn secondary" onclick="logout()">Uitloggen</button></div></div></div><div class="stats three"><div class="stat"><div class="muted">Totaal leads</div><div class="value">'+leads.length+'</div></div><div class="stat"><div class="muted">Laatste scan</div><div class="value" style="font-size:16px">'+(leads[0]?esc(fmtDate(leads[0].scannedAt)):'Nog geen scans')+'</div></div><div class="stat"><div class="muted">Privacy</div><div class="value" style="font-size:16px">Alleen jouw partneraccount</div></div></div><div class="card"><div id="flash" class="msg hidden"></div><div class="tabs"><button class="tab active" onclick="switchTab(\'scanner\', this)">Scanner</button><button class="tab" onclick="switchTab(\'leads\', this)">Leads</button><button class="tab" onclick="switchTab(\'account\', this)">Account</button></div><div id="tab-scanner"><div class="grid two"><div><h2>QR-scanner</h2><p class="muted" style="margin-bottom:12px">Open de camera en scan een badge met vCard-QR.</p><video id="video" class="video" playsinline muted autoplay></video><div class="row" style="margin-top:12px"><button class="btn" onclick="startCamera()">Camera starten</button><button class="btn secondary" onclick="stopCamera()">Camera stoppen</button><button class="btn secondary" onclick="addLeadFromText(document.getElementById(\'manualVcard\').value, \'Demo vCard\')">Demo-vCard opslaan</button></div><div class="small" style="margin-top:10px">Diagnostiek:<div id="diag"></div></div></div><div><h2>Fallback / demo vCard</h2><p class="muted" style="margin-bottom:12px">Handig voor testen of als een device tijdelijk geen QR kan lezen.</p><textarea id="manualVcard">BEGIN:VCARD\nFN:Jaap van den Brandhof\nEMAIL:jaap@kimura.nl\nORG:Kimura\nTEL:+31612345678\nEND:VCARD</textarea></div></div></div><div id="tab-leads" class="hidden"><h2>Leadlijst</h2><p class="muted" style="margin-bottom:12px">Direct opgeslagen scans, later te verrijken.</p><div class="list">'+(leads.length?leads.map(lead=>'<div class="lead"><div class="between"><div><strong>'+esc(lead.fullName)+'</strong><div class="meta">'+esc(lead.company||'Geen bedrijf')+'</div></div><span class="pill">'+esc(lead.status)+'</span></div><div class="meta">'+esc(lead.email||'Geen e-mail')+(lead.phone?' · '+esc(lead.phone):'')+'</div><div class="meta">'+esc(fmtDate(lead.scannedAt))+' · '+esc(lead.source||'')+'</div><div class="grid two" style="margin-top:12px"><div><label>Status</label><select onchange="changeLeadStatus(\''+esc(lead.id)+'\', this.value)">'+STATUSES.map(s=>'<option value="'+esc(s)+'" '+(s===lead.status?'selected':'')+'>'+esc(s)+'</option>').join('')+'</select></div><div><label>Telefoonnummer</label><input value="'+esc(lead.phone||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'phone\', this.value)" /></div></div><div class="grid two" style="margin-top:12px"><div><label>Naam</label><input value="'+esc(lead.fullName||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'fullName\', this.value)" /></div><div><label>E-mail</label><input value="'+esc(lead.email||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'email\', this.value)" /></div></div><div style="margin-top:12px"><label>Bedrijf</label><input value="'+esc(lead.company||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'company\', this.value)" /></div><div style="margin-top:12px"><label>Notitie</label><textarea oninput="changeLeadField(\''+esc(lead.id)+'\',\'notes\', this.value)">'+esc(lead.notes||'')+'</textarea></div></div>').join(''):'<div class="lead"><div class="muted">Nog geen leads gevonden.</div></div>')+'</div></div><div id="tab-account" class="hidden"><h2>Account</h2><p class="muted">Partner: '+esc(acc.partnerName)+' · '+esc(acc.email)+'</p><div class="small" style="margin-top:10px">Deze demo gebruikt localStorage per apparaat. Voor productie voeg je centrale login, database en synchronisatie toe.</div></div></div>';}
function render(){stopCamera();const app=document.getElementById('app');const acc=currentAccount();if(!acc)app.innerHTML=loginView();else if(acc.role==='admin')app.innerHTML=adminView();else app.innerHTML=partnerView();}
window.startCamera=startCamera;window.stopCamera=stopCamera;window.login=login;window.logout=logout;window.exportCsv=exportCsv;window.exportJson=exportJson;window.exportExcelLike=exportExcelLike;window.addLeadFromText=addLeadFromText;window.switchTab=switchTab;window.changeLeadStatus=changeLeadStatus;window.changeLeadField=changeLeadField;window.createPartner=createPartner;window.resetDemo=resetDemo;
render();
</script></body></html>
