<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>PBIG Partner Lead Scanner</title>
  <style>
    :root{
      --bg:#08131f;
      --bg-2:#0d2136;
      --surface:rgba(255,255,255,.06);
      --surface-2:rgba(255,255,255,.04);
      --line:rgba(255,255,255,.12);
      --text:#ffffff;
      --muted:#c1d1de;
      --pink:#c30d78;
      --orange:#cf5414;
      --yellow:#eac511;
      --blue:#4e6cb4;
      --teal:#247b82;
      --indigo:#314397;
      --accent:#4e6cb4;
      --accent-2:#247b82;
      --ok:#b8ffd8;
      --danger:#ffd3d3;
      --shadow:0 24px 64px rgba(0,0,0,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Segoe UI", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(78,108,180,.26), transparent 24%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 45%, #0a1724 100%);
      min-height:100vh;
    }
    .wrap{max-width:1140px;margin:0 auto;padding:16px}
    .shell{
      border:1px solid var(--line);
      border-radius:32px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(14px);
    }
    .brand-top{
      background:rgba(0,0,0,.18);
      padding:18px 18px 0 18px;
      border-bottom:1px solid var(--line);
    }
    .brand-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
      padding-bottom:16px;
    }
    .brand-logo{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:260px;
    }
    .brand-logo img{
      height:54px;
      width:auto;
      display:block;
      background:#fff;
      border-radius:10px;
      padding:4px 8px;
    }
    .brand-title{
      font-weight:700;
      letter-spacing:.01em;
    }
    .brand-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:14px;
    }
    .brand-chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }
    .brand-stripe{
      display:grid;
      grid-template-columns:repeat(6,1fr);
      gap:6px;
      padding-bottom:14px;
    }
    .stripe{height:10px;border-radius:999px}
    .s1{background:var(--pink)} .s2{background:var(--orange)} .s3{background:var(--yellow)}
    .s4{background:var(--blue)} .s5{background:var(--teal)} .s6{background:var(--indigo)}

    .content{padding:18px}
    .card{
      background:linear-gradient(180deg, var(--surface), var(--surface-2));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }
    .hero{
      display:grid;
      gap:16px;
      margin-bottom:16px;
    }
    .hero-main{
      position:relative;
      overflow:hidden;
    }
    .hero-main:after{
      content:"";
      position:absolute;
      right:-40px; bottom:-70px;
      width:240px; height:240px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(36,123,130,.35), transparent 68%);
      pointer-events:none;
    }
    h1,h2,h3,p{margin:0}
    h1{font-size:34px;line-height:1.05;margin-top:12px}
    h2{font-size:22px;margin-bottom:8px}
    h3{font-size:16px;margin-bottom:6px}
    .lead{
      margin-top:10px;
      color:var(--muted);
      max-width:760px;
      font-size:16px;
      line-height:1.55;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .grid{display:grid;gap:14px}
    .stats{display:grid;gap:14px}
    .stat{
      padding:16px;
      border:1px solid var(--line);
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }
    .stat .label{color:var(--muted);font-size:13px}
    .stat .value{font-size:26px;font-weight:800;margin-top:8px}
    .btn{
      appearance:none;
      border:none;
      border-radius:16px;
      padding:12px 16px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 12px 28px rgba(0,0,0,.22);
    }
    .btn.secondary{
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      box-shadow:none;
    }
    .btn:disabled{opacity:.55;cursor:not-allowed}
    input,textarea,select{
      width:100%;
      padding:12px 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.18);
      color:#fff;
      outline:none;
      font:inherit;
    }
    textarea{min-height:110px}
    label{display:block;font-size:14px;margin-bottom:6px;color:var(--muted)}
    .video{
      width:100%;
      aspect-ratio:4/3;
      background:#04111b;
      border-radius:20px;
      border:1px solid var(--line);
      object-fit:cover;
    }
    .msg{
      margin-top:10px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(78,108,180,.15);
      border:1px solid rgba(78,108,180,.28);
    }
    .msg.error{background:rgba(255,120,120,.12);border-color:rgba(255,120,120,.25);color:var(--danger)}
    .msg.ok{background:rgba(120,255,180,.12);border-color:rgba(120,255,180,.25);color:var(--ok)}
    .list{display:grid;gap:12px}
    .lead-card,.partner-card{
      border:1px solid var(--line);
      background:rgba(0,0,0,.14);
      border-radius:18px;
      padding:14px;
    }
    .meta,.small{font-size:13px;color:var(--muted);margin-top:6px}
    .pill{
      display:inline-flex;
      align-items:center;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-size:12px;
      font-weight:700;
    }
    .hidden{display:none !important}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab{
      padding:11px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      cursor:pointer;
      background:rgba(255,255,255,.05);
      color:#fff;
      font-weight:700;
    }
    .tab.active{background:rgba(78,108,180,.22);border-color:rgba(78,108,180,.42)}
    .note-card{
      background:linear-gradient(180deg, rgba(36,123,130,.18), rgba(255,255,255,.03));
      border:1px solid rgba(36,123,130,.24);
    }
    .footer-note{
      padding:16px 18px 20px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }
    @media (min-width:760px){
      .hero{grid-template-columns:1.2fr .8fr}
      .grid.two{grid-template-columns:1fr 1fr}
      .stats.three{grid-template-columns:1fr 1fr 1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <div class="brand-top">
        <div class="brand-header">
          <div class="brand-logo">
            <img src="assets/pbig-logo.png" alt="PBIG logo" />
            <div>
              <div class="brand-title">PBIG Partner Lead Scanner</div>
              <div class="brand-sub">Power BI Gebruikersgroep · partnerscans op de beursvloer</div>
            </div>
          </div>
          <div class="brand-chips">
            <div class="chip">Partnervloer</div>
            <div class="chip">Badge QR</div>
            <div class="chip">Mobiel & snel</div>
          </div>
        </div>
        <div class="brand-stripe">
          <div class="stripe s1"></div>
          <div class="stripe s2"></div>
          <div class="stripe s3"></div>
          <div class="stripe s4"></div>
          <div class="stripe s5"></div>
          <div class="stripe s6"></div>
        </div>
      </div>
      <div class="content">
        <div id="app"></div>
      </div>
      <div class="footer-note">PBIG-stijl demo voor partner lead capture · Segoe UI stack zonder ingebedde fontbestanden</div>
    </div>
  </div>

<script>
const STORAGE_KEY='pbig-brand-build-v4';
const DEMO_STATE={accounts:[{id:'partner-plainwater',email:'partner@plainwater.nl',password:'demo123',role:'partner',partnerName:'Plainwater'},{id:'partner-insumma',email:'partner@insumma.nl',password:'demo123',role:'partner',partnerName:'InSumma & Webdashboard'},{id:'admin-pbig',email:'admin@pbig.nl',password:'admin123',role:'admin',partnerName:'PBIG'}],leads:{'partner-plainwater':[{id:'lead-1',fullName:'Sanne de Wit',email:'sanne@contoso.nl',company:'Contoso',phone:'+31 6 12345678',status:'Nieuw',notes:'Interesse in Fabric governance.',scannedAt:'2026-03-07T10:12:00',source:'QR vCard'}],'partner-insumma':[]}};
const STATUSES=['Nieuw','Opvolgen','Contact gehad','Gekwalificeerd','Niet relevant'];
let state=loadState(),session=null,stream=null,timer=null;
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY);return raw?JSON.parse(raw):JSON.parse(JSON.stringify(DEMO_STATE));}catch{return JSON.parse(JSON.stringify(DEMO_STATE));}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(v){if(!v)return'-';try{return new Date(v).toLocaleString('nl-NL')}catch{return v}}
function currentAccount(){if(!session)return null;return state.accounts.find(a=>a.id===session.accountId)||null}
function currentLeads(){const acc=currentAccount();if(!acc||acc.role!=='partner')return[];return state.leads[acc.id]||[]}
function flash(text,isError=false,isOk=false){const el=document.getElementById('flash');if(!el)return;el.className=isError?'msg error':(isOk?'msg ok':'msg');el.textContent=text;el.classList.remove('hidden')}
function clearFlash(){const el=document.getElementById('flash');if(el)el.classList.add('hidden')}
function parseVCard(text){const lines=text.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);const pick=(prefixes)=>{const arr=Array.isArray(prefixes)?prefixes:[prefixes];const line=lines.find(l=>arr.some(p=>l.toUpperCase().startsWith(p.toUpperCase())));if(!line)return'';const i=line.indexOf(':');return i>=0?line.slice(i+1).trim():''};return{fullName:(pick(['FN:','N:'])||'Onbekende bezoeker').replace(/;/g,' ').replace(/\s+/g,' ').trim(),email:pick(['EMAIL:','EMAIL;TYPE=INTERNET:','EMAIL;TYPE=WORK:']),company:pick('ORG:'),phone:pick(['TEL:','TEL;TYPE=CELL:','TEL;TYPE=WORK:'])}}
function addLeadFromText(text,source){const acc=currentAccount();if(!acc||acc.role!=='partner')return flash('Niet toegestaan.',true);if(!String(text).toUpperCase().includes('BEGIN:VCARD'))return flash('Dit lijkt geen vCard te zijn.',true);const parsed=parseVCard(text);const lead={id:'lead-'+Date.now(),fullName:parsed.fullName||'Onbekende bezoeker',email:parsed.email||'',company:parsed.company||'',phone:parsed.phone||'',status:'Nieuw',notes:'',scannedAt:new Date().toISOString(),source:source||'QR vCard'};if(!state.leads[acc.id])state.leads[acc.id]=[];state.leads[acc.id].unshift(lead);saveState();render();flash('Lead opgeslagen voor '+lead.fullName,false,true)}
function updateLead(id,patch){const acc=currentAccount();if(!acc||acc.role!=='partner')return;state.leads[acc.id]=(state.leads[acc.id]||[]).map(l=>l.id===id?({...l,...patch}):l);saveState()}
function download(name,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000)}
function exportCsv(){const acc=currentAccount();if(!acc)return;const rows=currentLeads(),headers=['fullName','email','company','phone','status','notes','scannedAt','source'];const e=v=>'"'+String(v??'').replace(/"/g,'""')+'"';const csv=[headers.join(','),...rows.map(r=>headers.map(h=>e(r[h])).join(','))].join('\n');download((acc.partnerName||'partner').toLowerCase().replace(/\s+/g,'-')+'-leads.csv',csv,'text/csv;charset=utf-8')}
function exportJson(){const acc=currentAccount();if(!acc)return;download((acc.partnerName||'partner').toLowerCase().replace(/\s+/g,'-')+'-leads.json',JSON.stringify(currentLeads(),null,2),'application/json')}
function exportExcelLike(){const acc=currentAccount();if(!acc)return;const rows=currentLeads(),headers=['fullName','email','company','phone','status','notes','scannedAt','source'];const e=v=>'"'+String(v??'').replace(/"/g,'""')+'"';const csv=[headers.join(','),...rows.map(r=>headers.map(h=>e(r[h])).join(','))].join('\n');download((acc.partnerName||'partner').toLowerCase().replace(/\s+/g,'-')+'-leads.xls',csv,'application/vnd.ms-excel')}
async function startCamera(){clearFlash();const diag=document.getElementById('diag');if(diag){diag.innerHTML=[['Secure context',window.isSecureContext?'ja':'nee'],['Protocol',location.protocol||'(onbekend)'],['getUserMedia',!!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)],['BarcodeDetector','BarcodeDetector' in window]].map(([k,v])=>'<div>'+k+': <strong>'+v+'</strong></div>').join('')}if(!window.isSecureContext)return flash('Camera werkt alleen via HTTPS of localhost.',true);if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia))return flash('Deze browser ondersteunt geen cameratoegang.',true);try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});const video=document.getElementById('video');video.srcObject=stream;await video.play();if('BarcodeDetector' in window){const detector=new BarcodeDetector({formats:['qr_code']});timer=setInterval(async()=>{try{const codes=await detector.detect(video);if(codes&&codes.length){const value=codes[0].rawValue||'';if(value.toUpperCase().includes('BEGIN:VCARD')){addLeadFromText(value,'Camera QR-scan');stopCamera()}else{flash('QR gevonden, maar inhoud is geen vCard.',true)}}}catch(e){}},800);flash('Camera gestart. Richt op de QR-code op de badge.')}else{flash('Camera gestart, maar BarcodeDetector ontbreekt in deze browser. Gebruik demo-vCard of voeg in productie een QR-library toe.',true)}}catch(err){flash('Camera kon niet starten: '+(err&&err.message?err.message:'onbekende fout'),true)}}
function stopCamera(){if(timer){clearInterval(timer);timer=null}if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}const video=document.getElementById('video');if(video)video.srcObject=null}
function logout(){stopCamera();session=null;render()}
function login(email,password){const account=state.accounts.find(a=>a.email.toLowerCase()===String(email).trim().toLowerCase()&&a.password===password);if(!account)return flash('Onjuiste inloggegevens.',true);session={accountId:account.id,loggedInAt:new Date().toISOString()};render()}
function createPartner(){const partnerName=(document.getElementById('newPartnerName').value||'').trim();const email=(document.getElementById('newPartnerEmail').value||'').trim().toLowerCase();const password=document.getElementById('newPartnerPassword').value||'';if(!partnerName||!email||!password)return flash('Vul partnernaam, e-mail en wachtwoord in.',true);if(state.accounts.some(a=>a.email.toLowerCase()===email))return flash('Er bestaat al een account met dit e-mailadres.',true);let idBase='partner-'+partnerName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');if(!idBase||idBase==='partner-')idBase='partner-'+Date.now();let uniqueId=idBase;if(state.accounts.some(a=>a.id===uniqueId))uniqueId+='-'+Date.now();state.accounts.push({id:uniqueId,email,password,role:'partner',partnerName});state.leads[uniqueId]=[];saveState();render();flash('Partneraccount aangemaakt voor '+partnerName+'.',false,true)}
function adminStats(){return state.accounts.filter(a=>a.role==='partner').map(a=>({partnerName:a.partnerName,email:a.email,count:(state.leads[a.id]||[]).length}))}
function switchTab(tab,btn){document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-scanner').classList.toggle('hidden',tab!=='scanner');document.getElementById('tab-leads').classList.toggle('hidden',tab!=='leads');document.getElementById('tab-account').classList.toggle('hidden',tab!=='account')}
function changeLeadStatus(id,value){updateLead(id,{status:value})}
function changeLeadField(id,field,value){const patch={};patch[field]=value;updateLead(id,patch)}
function loginView(){return '<div class="hero"><div class="card hero-main"><div class="pill">PBIG 2027 partner tool</div><h1>Scan badges, bewaar leads veilig en exporteer direct.</h1><p class="lead">Speciaal voor de partnervloer: snel scannen, direct opslaan en alleen je eigen leads zien.</p><div class="row" style="margin-top:14px"><div class="chip">Badge QR</div><div class="chip">Partner accounts</div><div class="chip">CSV / JSON / Excel</div></div></div><div class="card note-card"><h2>Visuele richting</h2><p class="lead" style="font-size:15px;max-width:none">Deze versie gebruikt het aangeleverde PBIG-logo, de kenmerkende kleurstrook en een meer merkvaste donkerblauwe event-uitstraling.</p></div></div><div class="grid two"><div class="card"><h2>Inloggen</h2><div id="flash" class="msg hidden"></div><div style="margin-top:12px"><label>E-mailadres</label><input id="loginEmail" value="partner@plainwater.nl" /></div><div style="margin-top:12px"><label>Wachtwoord</label><input id="loginPassword" type="password" value="demo123" /></div><div class="row" style="margin-top:12px"><button class="btn" onclick="login(document.getElementById(\'loginEmail\').value, document.getElementById(\'loginPassword\').value)">Inloggen</button></div></div><div class="card"><h2>Demo-accounts</h2><div class="small"><p><strong>Partner</strong>: partner@plainwater.nl / demo123</p><p><strong>Admin</strong>: admin@pbig.nl / admin123</p><p style="margin-top:10px">Gebruik admin om nieuwe partneraccounts toe te voegen in deze deployable demo.</p></div></div></div>'}
function adminView(){const stats=adminStats(),total=stats.reduce((s,r)=>s+r.count,0);return '<div class="card"><div class="between"><div><div class="pill">Beheer</div><h1>PBIG partner-overzicht</h1><p class="lead" style="font-size:15px">Alleen aantallen zichtbaar. Leads blijven afgeschermd per partner.</p></div><div class="row"><button class="btn secondary" onclick="logout()">Uitloggen</button></div></div></div><div class="stats three"><div class="stat"><div class="label">Partners</div><div class="value">'+stats.length+'</div></div><div class="stat"><div class="label">Totaal scans</div><div class="value">'+total+'</div></div><div class="stat"><div class="label">Leadgegevens</div><div class="value" style="font-size:16px">Verborgen voor admin</div></div></div><div class="card"><div id="flash" class="msg hidden"></div><div class="grid two"><div><h2>Partner toevoegen</h2><p class="lead" style="font-size:15px;max-width:none">Maak hier demo-accounts aan die direct kunnen inloggen.</p><div style="margin-top:12px"><label>Partnernaam</label><input id="newPartnerName" placeholder="Bijv. DataMinds" /></div><div style="margin-top:12px"><label>E-mail</label><input id="newPartnerEmail" placeholder="partner@dataminds.nl" /></div><div style="margin-top:12px"><label>Wachtwoord</label><input id="newPartnerPassword" type="password" placeholder="Kies een wachtwoord" /></div><div class="row" style="margin-top:12px"><button class="btn" onclick="createPartner()">Partner aanmaken</button></div></div><div><h2>Scans per partner</h2><div class="list">'+stats.map(row=>'<div class="partner-card"><div class="between"><div><strong>'+esc(row.partnerName)+'</strong><div class="meta">'+esc(row.email)+'</div></div><span class="pill">'+row.count+' scans</span></div></div>').join('')+'</div></div></div></div>'}
function partnerView(){const acc=currentAccount(),leads=currentLeads();return '<div class="card"><div class="between"><div><div class="pill">Partneromgeving</div><h1>'+esc(acc.partnerName)+'</h1><p class="lead" style="font-size:15px">Snel te gebruiken op mobiel tijdens de beurs. In deze demo wordt data lokaal opgeslagen.</p></div><div class="row"><button class="btn secondary" onclick="exportCsv()">CSV</button><button class="btn secondary" onclick="exportExcelLike()">Excel</button><button class="btn secondary" onclick="exportJson()">JSON</button><button class="btn secondary" onclick="logout()">Uitloggen</button></div></div></div><div class="stats three"><div class="stat"><div class="label">Totaal leads</div><div class="value">'+leads.length+'</div></div><div class="stat"><div class="label">Laatste scan</div><div class="value" style="font-size:16px">'+(leads[0]?esc(fmtDate(leads[0].scannedAt)):'Nog geen scans')+'</div></div><div class="stat"><div class="label">Privacy</div><div class="value" style="font-size:16px">Alleen jouw partneraccount</div></div></div><div class="card"><div id="flash" class="msg hidden"></div><div class="tabs"><button class="tab active" onclick="switchTab(\'scanner\', this)">Scanner</button><button class="tab" onclick="switchTab(\'leads\', this)">Leads</button><button class="tab" onclick="switchTab(\'account\', this)">Account</button></div><div id="tab-scanner"><div class="grid two"><div><h2>QR-scanner</h2><p class="lead" style="font-size:15px;max-width:none">Open de camera en scan een badge met vCard-QR.</p><video id="video" class="video" playsinline muted autoplay></video><div class="row" style="margin-top:12px"><button class="btn" onclick="startCamera()">Camera starten</button><button class="btn secondary" onclick="stopCamera()">Camera stoppen</button><button class="btn secondary" onclick="addLeadFromText(document.getElementById(\'manualVcard\').value, \'Demo vCard\')">Demo-vCard opslaan</button></div><div class="small" style="margin-top:10px">Diagnostiek:<div id="diag"></div></div></div><div><h2>Fallback / demo vCard</h2><p class="lead" style="font-size:15px;max-width:none">Handig voor testen of als een device tijdelijk geen QR kan lezen.</p><textarea id="manualVcard">BEGIN:VCARD\nFN:Jaap van den Brandhof\nEMAIL:jaap@kimura.nl\nORG:Kimura\nTEL:+31612345678\nEND:VCARD</textarea></div></div></div><div id="tab-leads" class="hidden"><h2>Leadlijst</h2><div class="list">'+(leads.length?leads.map(lead=>'<div class="lead-card"><div class="between"><div><strong>'+esc(lead.fullName)+'</strong><div class="meta">'+esc(lead.company||'Geen bedrijf')+'</div></div><span class="pill">'+esc(lead.status)+'</span></div><div class="meta">'+esc(lead.email||'Geen e-mail')+(lead.phone?' · '+esc(lead.phone):'')+'</div><div class="meta">'+esc(fmtDate(lead.scannedAt))+' · '+esc(lead.source||'')+'</div><div class="grid two" style="margin-top:12px"><div><label>Status</label><select onchange="changeLeadStatus(\''+esc(lead.id)+'\', this.value)">'+STATUSES.map(s=>'<option value="'+esc(s)+'" '+(s===lead.status?'selected':'')+'>'+esc(s)+'</option>').join('')+'</select></div><div><label>Telefoonnummer</label><input value="'+esc(lead.phone||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'phone\', this.value)" /></div></div><div class="grid two" style="margin-top:12px"><div><label>Naam</label><input value="'+esc(lead.fullName||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'fullName\', this.value)" /></div><div><label>E-mail</label><input value="'+esc(lead.email||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'email\', this.value)" /></div></div><div style="margin-top:12px"><label>Bedrijf</label><input value="'+esc(lead.company||'')+'" oninput="changeLeadField(\''+esc(lead.id)+'\',\'company\', this.value)" /></div><div style="margin-top:12px"><label>Notitie</label><textarea oninput="changeLeadField(\''+esc(lead.id)+'\',\'notes\', this.value)">'+esc(lead.notes||'')+'</textarea></div></div>').join(''):'<div class="lead-card"><div class="muted">Nog geen leads gevonden.</div></div>')+'</div></div><div id="tab-account" class="hidden"><h2>Account</h2><p class="lead" style="font-size:15px;max-width:none">Partner: '+esc(acc.partnerName)+' · '+esc(acc.email)+'</p></div></div>'}
function render(){stopCamera();const app=document.getElementById('app');const acc=currentAccount();if(!acc)app.innerHTML=loginView();else if(acc.role==='admin')app.innerHTML=adminView();else app.innerHTML=partnerView()}
window.startCamera=startCamera;window.stopCamera=stopCamera;window.login=login;window.logout=logout;window.exportCsv=exportCsv;window.exportJson=exportJson;window.exportExcelLike=exportExcelLike;window.addLeadFromText=addLeadFromText;window.switchTab=switchTab;window.changeLeadStatus=changeLeadStatus;window.changeLeadField=changeLeadField;window.createPartner=createPartner;
render();
</script>
</body>
</html>
